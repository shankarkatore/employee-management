<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reset Password | Employee Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --bg: #f4f6fb;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border: rgba(0, 0, 0, 0.08);
            --accent: #f59e0b;
            --accent-dark: #d97706;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .forgot-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
        }

        .brand-circle {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 50%;
            color: white;
            font-size: 26px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
        }

        .brand h4 {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .brand p {
            font-size: 14px;
            color: #6b7280;
        }

        .form-label {
            font-weight: 500;
            font-size: 14px;
            color: #374151;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--accent);
        }

        .btn-reset {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .btn-reset:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.35);
        }

        .alert {
            font-size: 14px;
            border-radius: 10px;
            padding: 10px 14px;
        }

        .role-btn-group input[type="radio"] {
            display: none;
        }

        .role-btn-group label {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 14px;
            background: white;
            color: #4b5563;
        }

        .role-btn-group input[type="radio"]:checked + label {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(245, 158, 11, 0.15);
        }

        .footer-text {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-top: 16px;
        }
    </style>
</head>

<body>

<div class="forgot-wrapper">
    <div class="forgot-card">

        <!-- BRAND -->
        <div class="brand">
            <div class="brand-circle">🔑</div>
            <h4>Reset Password</h4>
            <p>Update your credentials directly</p>
        </div>

        <!-- FORM -->
        <form th:action="@{/forgot-password}" method="post">

            <!-- CSRF -->
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <!-- Role Selection -->
            <div class="mb-3">
                <label class="form-label">I am an:</label>
                <div class="d-flex gap-2 role-btn-group">
                    <input type="radio" name="role" id="roleEmployee" value="EMPLOYEE" checked>
                    <label for="roleEmployee">
                        <i class="bi bi-person me-1"></i>Employee
                    </label>

                    <input type="radio" name="role" id="roleAdmin" value="ADMIN">
                    <label for="roleAdmin">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                    </label>
                </div>
            </div>

            <!-- Username or Email -->
            <div class="mb-3">
                <label class="form-label">Username or Email</label>
                <input type="text"
                       class="form-control"
                       name="usernameOrEmail"
                       placeholder="Enter your username or email"
                       required
                       autofocus>
            </div>

            <!-- New Password -->
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password"
                       class="form-control"
                       name="newPassword"
                       placeholder="Enter new password"
                       required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password"
                       class="form-control"
                       name="confirmPassword"
                       placeholder="Confirm new password"
                       required>
            </div>

            <!-- Action Buttons -->
            <button type="submit" class="btn btn-reset w-100 text-white">
                <i class="bi bi-check-circle me-1"></i>
                Reset Password
            </button>

            <!-- Links -->
            <div class="mt-3 text-center">
                <a href="/login" class="btn btn-link text-decoration-none text-muted fw-medium small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Login
                </a>
            </div>

            <!-- Messages (Local errors shown if redirection has errors) -->
            <div th:if="${error}" class="alert alert-danger mt-3 text-center" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success mt-3 text-center" th:text="${success}"></div>

        </form>

        <div class="footer-text">
            Employee Management System
        </div>

    </div>
</div>

</body>
</html>
